<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root {
  --top-height: 56px;
}

body {
  overflow-x: hidden;
  margin: 0;
}

/* Layout */
.wrapper {
  display: flex;
  width: 100%;
}

/* ================= Sidebar ================= */
#sidebar {
  min-width: 250px;
  max-width: 250px;
  background: #1f343d;
  color: #fff;
  transition: all 0.3s ease;
}

/* Collapsed sidebar */
#sidebar.collapsed {
  min-width: 80px;
  max-width: 80px;
}

/* Sidebar header */
#sidebar .sidebar-header {
  height: var(--top-height);
  background: #2d5b70;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

/* POS text */
.pos-text {
  display: none;
  font-size: 18px;
  font-weight: bold;
}

/* Full logo text */
.logo-text {
  font-size: 18px;
  white-space: nowrap;
  font-weight: bold;
}

/* When collapsed */
#sidebar.collapsed .logo-text {
  display: none;
}

#sidebar.collapsed .pos-text {
  display: block;
}

/* Sidebar menu */
#sidebar ul {
  padding: 0;
  margin: 0;
}

#sidebar ul li {
  list-style: none;
}

#sidebar ul li a {
  padding: 12px 20px;
  color: #ddd;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: background 0.2s ease;
}

/* Icon */
#sidebar ul li a i {
  font-size: 1.4rem;
}

/* Menu text */
.menu-text {
  white-space: nowrap;
}

/* Hover */
#sidebar ul li:hover {
  background: #2c3e50;
}

/* Center icons when collapsed */
#sidebar.collapsed ul li a {
  justify-content: center;
}

#sidebar.collapsed .menu-text {
  display: none;
}

/* ================= Content ================= */
#content {
  width: 100%;
  min-height: 100vh;
  background: #f4f6f9;
  transition: all 0.3s ease;
}

/* Top navbar */
#content .navbar {
  height: var(--top-height);
  padding: 0 16px;
  display: flex;
  align-items: center;
}

</style>
</head>
<body>

    
<div class="wrapper">

  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-header">
        <h5 class="pos-text">POS</h5>
        <span class="logo-text">Inventory</span>
        </div>

        <ul class="list-unstyled components">
        <li>
            <a href="#">
            <i class="bi bi-speedometer2"></i>
            <span class="menu-text">Dashboard</span>
            </a>
        </li>
        <li>
            <a href="#">
            <i class="bi bi-cart-check"></i>
            <span class="menu-text">Sales</span>
            </a>
        </li>
        <li>
            <a href="#">
            <i class="bi bi-box-seam"></i>
            <span class="menu-text">Purchase</span>
            </a>
        </li>
        </ul>
  </nav>

  <!-- Page Content -->
  <div id="content">

    <!------------------- Top Navbar ----------------------------->
    <nav class="navbar navbar-light" style="background-color: #4a819b;">
        
        <button id="sidebarToggle" class="btn btn-default" style="color: #fff;">
            ☰
        </button>
        <div class="ms-auto d-flex align-items-center">
                
            <a href="#" class="btn btn-default text-white me-2">Pending Orders</a>

            <form method="post" action="{% url 'logout' %}">
                {% csrf_token %}
                <button class="btn btn-danger mx-4 ms-4" type="submit" onclick="return confirm('Are you sure to Logout?')">Logout</button>
            </form>
        </div>
    </nav>

    {% block content %}{% endblock %}
  </div>
</div>


<script>
document.getElementById('sidebarToggle').addEventListener('click', function () {
  document.getElementById('sidebar').classList.toggle('collapsed');
});
</script>

</body>
</html>
