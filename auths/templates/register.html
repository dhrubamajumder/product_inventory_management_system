{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</head>



<body class="bg-light vh-100">

    <!-- ALERT SECTION -->
    {% if form.errors %}
    <div class="position-fixed top-0 start-50 translate-middle-x mt-3" style="z-index: 1050; width: 420px;">
        <div class="alert alert-danger alert-dismissible fade show shadow" role="alert">
            {% for field in form %}
                {% for error in field.errors %}
                    <div>{{ error }}</div>
                {% endfor %}
            {% endfor %}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    </div>
    {% endif %}


    <!-- CENTER CARD -->
    <div class="d-flex align-items-center justify-content-center vh-100">
        <div class="card shadow-lg border-0" style="width: 420px;">
            <div class="card-body p-4">
                <h3 class="text-center mb-4 fw-bold">📝 Register</h3>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password1" class="form-control" placeholder="Enter password" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" name="password2" class="form-control" placeholder="Confirm password" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">
                            Create Account
                        </button>
                    </div>
                    <p class="text-center mt-3 mb-0">
                    Already have an account?
                    <a href="{% url 'login' %}">Login</a>
                    </p>
                </form>

            </div>
        </div>
    </div>

</body>

</html>

{% endblock %}
